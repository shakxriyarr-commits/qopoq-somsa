<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloqa | SHOKH BURGER</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
    <style>
        :root {
            --bg: #171717; --text: #d1cdcd; --accent: #ff00cc; 
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        
        .navbar { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); z-index: 2000; box-sizing: border-box; 
        }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--accent); text-decoration: none; letter-spacing: 2px; }
        .nav-link { color: var(--text); text-decoration: none; font-weight: bold; padding: 8px 20px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); transition: 0.3s; }
        .nav-link:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .contact-container { flex: 1; padding: 120px 20px 50px; display: flex; justify-content: center; align-items: center; }
        .contact-card { 
            background: var(--glass); border: 1px solid var(--border); 
            padding: 40px; border-radius: 30px; width: 100%; max-width: 500px; 
            text-align: center; backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .contact-card h1 { color: var(--accent); text-shadow: 0 0 15px var(--accent); margin-bottom: 30px; }
        .info-item { margin-bottom: 25px; font-size: 1.2rem; }
        .info-item b { color: var(--accent); display: block; margin-bottom: 5px; font-size: 0.9rem; text-transform: uppercase; }
        
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social-btn { 
            text-decoration: none; color: white; background: linear-gradient(45deg, var(--accent), #3333ff); 
            padding: 12px 25px; border-radius: 15px; font-weight: bold; transition: 0.3s;
        }
        .social-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">SHOKH BURGER</a>
    <a href="index.html" class="nav-link">🏠 Bosh sahifa</a>
</nav>

<div class="contact-container">
    <div class="contact-card">
        <h1>Biz bilan aloqa</h1>
        
        <div class="info-item">
            <b>📍 Manzilimiz</b>
            Toshkent shahri, Chilonzor tumani, Cukur ko'chasi 1-uy.
        </div>

        <div class="info-item">
            <b>📞 Telefon</b>
            +998 90 123 45 67
        </div>

        <div class="info-item">
            <b>⏰ Ish vaqti</b>
            Har kuni: 10:00 - 23:00
        </div>

        <div class="social-links">
            <a href="https://t.me/shakhriyarr" target="_blank" class="social-btn">Telegram</a>
            <a href="#" class="social-btn" style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);">Instagram</a>
        </div>
    </div>
</div>

</body>
</html>
