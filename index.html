<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>QOPOQ SOMSA | Premium</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRWdftvMMciMPjUfgLcBdapsJhXFMdg9yw-MV0bPDY9wi8qgAPcGIjPJb4&s">
    <style>
        :root {
            --bg: #0a0a0a;
            --navbar-bg: rgba(10, 10, 10, 0.9);
            --text: #ffffff;
            --accent: #0047AB; 
            --accent-glow: #00008B;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --btn-gradient: linear-gradient(90deg, #00008B, #0047AB);
        }

        .light {
            --bg: #ffffff;
            --navbar-bg: rgba(255, 255, 255, 0.95);
            --text: #1a1a1a;
            --accent: #00008B;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --btn-gradient: linear-gradient(90deg, #00008B, #0056b3);
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; overflow-x: hidden; scroll-behavior: smooth; }

        /* NAVBAR */
        .navbar { 
            position: fixed; top: 0; width: 100%; min-height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 5%; background: var(--navbar-bg); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); z-index: 2000; box-sizing: border-box;
        }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; text-decoration: none; text-transform: uppercase; }
        
        .nav-tools { display: flex; align-items: center; gap: 15px; }
        
        .search-input { 
            background: var(--glass); border: 1px solid var(--border); 
            color: var(--text); padding: 8px 18px; border-radius: 25px; outline: none; 
            width: 140px; transition: 0.4s; font-size: 14px;
        }
        .search-input:focus { width: 200px; border-color: var(--accent); }

        .nav-link { 
            text-decoration: none; color: var(--text); font-size: 13px; font-weight: bold; 
            background: var(--glass); padding: 8px 16px; border-radius: 20px; 
            border: 1px solid var(--border); transition: 0.3s;
        }
        .nav-link:hover { border-color: var(--accent); background: var(--accent); color: white; }

        header { text-align: center; padding: 150px 20px 60px; }
        header h1 { font-size: clamp(2.5rem, 10vw, 4rem); margin: 0; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 20px var(--accent-glow); color: white; }
        header p { font-size: 1.1rem; opacity: 0.7; margin-top: 10px; }

        /* MENU GRID - DOIMIY RAZMER UCHUN TUZATILDI */
        .menu { 
            display: grid; 
            /* Har bir ustun kamida 280px, ko'pi bilan 1 qism joy oladi */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px 5%; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .item { 
            background: #111111; border: 1px solid var(--border); 
            border-radius: 25px; padding: 20px; text-align: center; 
            transition: 0.4s; display: flex; flex-direction: column; position: relative;
            /* Kartochka juda katta bo'lib ketmasligi uchun max-width */
            max-width: 350px; 
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .light .item { background: #f9f9f9; }
        .item:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 40px rgba(0, 0, 139, 0.3); }
        
        .item img { width: 100%; height: 200px; border-radius: 20px; object-fit: cover; }
        .item h3 { margin: 15px 0 5px; font-size: 1.4rem; color: white; }
        .light .item h3 { color: #1a1a1a; }

        .price { color: var(--accent); font-weight: 800; font-size: 1.3rem; margin: 10px 0; }
        
        .button { 
            background: var(--btn-gradient); color: white; border: none; padding: 12px; border-radius: 12px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .button:hover { filter: brightness(1.3); transform: scale(1.02); }

        /* SAVATCHA PANEL */
        .cart-panel { 
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; 
            background: var(--bg); border-left: 3px solid var(--accent); 
            z-index: 3000; padding: 30px; transition: 0.5s; box-shadow: -10px 0 50px #000; overflow-y: auto; box-sizing: border-box;
        }
        .cart-panel.active { right: 0; }
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; 
        }
        .cart-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { 
            background: var(--accent); color: white; border: none; 
            width: 30px; height: 30px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { filter: brightness(1.2); }

        /* ADMIN PANEL */
        #admin-box { 
            position: fixed; top: 100px; right: 20px; width: 280px; 
            background: #111111; border: 2px solid var(--accent); 
            border-radius: 25px; padding: 25px; z-index: 5000; display: none; box-shadow: 0 0 40px rgba(0,0,0,0.8); 
        }
        .light #admin-box { background: white; }

        footer { padding: 60px; text-align: center; border-top: 1px solid var(--border); margin-top: 100px; }
        .f-text { opacity: 0.4; cursor: pointer; font-size: 12px; line-height: 1.8; color: var(--text); }

        @media (max-width: 600px) {
            .navbar { padding: 10px 3%; }
            .logo { font-size: 1.2rem; }
            .search-input { display: none; }
            header h1 { font-size: 2.5rem; }
            .menu { grid-template-columns: 1fr; justify-items: center; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">QOPOQ SOMSA</a>
    <div class="nav-tools">
        <input type="text" id="searchInput" class="search-input" placeholder="Qidirish..." oninput="filterItems()">
        <a href="aloqa.html" class="nav-link">📞 Aloqa</a>
        <button onclick="toggleMode()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌓</button>
        <div onclick="toggleCart()" style="cursor:pointer; font-size:22px; position:relative;">
            🛒 <span id="cart-badge" style="position:absolute; top:-10px; right:-10px; background:var(--accent); color:white; font-size:10px; padding:2px 6px; border-radius:50%; font-weight:bold;">0</span>
        </div>
    </div>
</nav>

<header>
    <h1>QOPOQ SOMSA</h1>
    <p>Premium Ta'm, Unutilmas Lazzat!</p>
</header>

<div id="menuList" class="menu"></div>

<div id="cartPanel" class="cart-panel">
    <span onclick="toggleCart()" style="float:right; cursor:pointer; font-size:35px; color:var(--accent);">&times;</span>
    <h2 style="color:var(--text)">Savat</h2>
    <div id="cart-list" style="margin-top:30px; color:var(--text)"></div>
    <h3 style="display:flex; justify-content:space-between; margin-top:30px; color:var(--text)">Jami: <span id="total-price">0</span> so'm</h3>
    <button class="button" style="width:100%; margin-top:20px;" onclick="checkout()">Sotib olish</button>
</div>

<div id="admin-box">
    <h3 style="text-align:center; color:var(--accent); margin-bottom:20px;">Admin Panel</h3>
    <input type="text" id="p-name" style="width:100%; padding:12px; margin-bottom:10px; background:rgba(0,0,0,0.3); color:#fff; border:1px solid var(--border); border-radius:10px; box-sizing:border-box;" placeholder="Taom nomi">
    <input type="number" id="p-price" style="width:100%; padding:12px; margin-bottom:10px; background:rgba(0,0,0,0.3); color:#fff; border:1px solid var(--border); border-radius:10px; box-sizing:border-box;" placeholder="Narxi">
    <input type="text" id="p-img" style="width:100%; padding:12px; margin-bottom:10px; background:rgba(0,0,0,0.3); color:#fff; border:1px solid var(--border); border-radius:10px; box-sizing:border-box;" placeholder="Rasm URL">
    <button class="button" style="width:100%" onclick="addProduct()">Qo'shish</button>
    <button onclick="closeAdmin()" style="background:none; border:none; color:red; width:100%; margin-top:15px; cursor:pointer; font-weight:bold;">Yopish</button>
</div>

<footer>
    <p class="f-text" onclick="handleAdmin()">
        © QOPOQ SOMSA Premium. Barcha huquqlar himoyalangan. <br>
        Xorazm xalqiga 7 yildan beri xizmat qilayotgan "Qopoq Somsa" da sizni kutib qolamiz
    
    </p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCZdqBBYEoIXAqln8a9c801AT3G_I_ys4U",
        authDomain: "shsh-120cf.firebaseapp.com",
        projectId: "shsh-120cf",
        storageBucket: "shsh-120cf.firebasestorage.app",
        messagingSenderId: "897260945183",
        appId: "1:897260945183:web:6e6fd385b1718ed00afa2a",
        databaseURL: "https://shsh-120cf-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productsRef = ref(db, 'products');

    window.products = [];
    window.cart = JSON.parse(localStorage.getItem('burger_cart_blue_final')) || [];
    window.isAdmin = false;
    let clicks = 0;

    const BOT_TOKEN = "8740580495:AAGLyL1oeM-Pu96tFzwvb5Y63uJaPWmGgEI"; 
    const CHAT_ID = "7312694067"; 

    onValue(productsRef, (snapshot) => {
        const data = snapshot.val();
        window.products = [];
        if (data) {
            Object.keys(data).forEach(key => {
                window.products.push({ fKey: key, ...data[key] });
            });
        }
        window.renderMenu();
    });

    window.renderMenu = function(data = window.products) {
        const menu = document.getElementById('menuList');
        menu.innerHTML = data.map(p => `
            <div class="item">
                ${window.isAdmin ? `<button style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; z-index:100;" onclick="removeProduct('${p.fKey}')">&times;</button>` : ''}
                <img src="${p.img}" onerror="this.src='https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500'">
                <h3>${p.name}</h3>
                <div class="price">${p.price.toLocaleString()} so'm</div>
                <button class="button" onclick="addToCart(${p.id})">Savatga qo'shish</button>
            </div>
        `).join('');
    };

    window.addToCart = function(id) {
        const p = window.products.find(x => x.id === id);
        const item = window.cart.find(x => x.id === id);
        if(item) item.qty++; else window.cart.push({...p, qty: 1});
        window.updateCart();
    };

    window.updateQty = function(id, delta) {
        const item = window.cart.find(x => x.id === id);
        if(item) {
            item.qty += delta;
            if(item.qty <= 0) {
                window.cart = window.cart.filter(x => x.id !== id);
            }
            window.updateCart();
        }
    };

    window.updateCart = function() {
        localStorage.setItem('burger_cart_blue_final', JSON.stringify(window.cart));
        document.getElementById('cart-badge').innerText = window.cart.reduce((s, i) => s + i.qty, 0);
        let total = 0;
        document.getElementById('cart-list').innerHTML = window.cart.map(i => {
            total += i.price * i.qty;
            return `<div class="cart-item">
                <div>
                    <b>${i.name}</b><br>
                    <span style="font-size:12px; opacity:0.7;">${i.price.toLocaleString()} so'm</span>
                </div>
                <div class="cart-controls">
                    <button class="qty-btn" onclick="updateQty(${i.id}, -1)">-</button>
                    <span style="font-weight:bold; min-width:20px; text-align:center;">${i.qty}</span>
                    <button class="qty-btn" onclick="updateQty(${i.id}, 1)">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('total-price').innerText = total.toLocaleString();
    };

    window.checkout = function() {
        if (window.cart.length === 0) return alert("Savat bo'sh!");
        const tel = prompt("Telefon raqamingiz:");
        const manzil = prompt("Manzilni kiriting:");
        if (!tel || !manzil) return alert("Ma'lumotlar to'liq emas!");

        let text = `🔵 YANGI BUYURTMA (TO'Q KO'K):\n📞 Tel: ${tel}\n📍 Manzil: ${manzil}\n\n`;
        let jami = 0;
        window.cart.forEach(i => {
            text += `• ${i.name} (${i.qty} dona)\n`;
            jami += i.price * i.qty;
        });
        text += `\n💰 JAMI: ${jami.toLocaleString()} so'm`;

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text })
        }).then(() => {
            alert("Buyurtma qabul qilindi!");
            window.cart = []; window.updateCart(); window.toggleCart();
        });
    };

    window.filterItems = () => {
        const q = document.getElementById('searchInput').value.toLowerCase();
        window.renderMenu(window.products.filter(p => p.name.toLowerCase().includes(q)));
    };

    window.toggleMode = () => document.body.classList.toggle('light');
    window.toggleCart = () => document.getElementById('cartPanel').classList.toggle('active');

    window.handleAdmin = () => {
        clicks++;
        if(clicks === 3) {
            if(prompt("Admin paroli:") === "7777") {
                window.isAdmin = true;
                document.getElementById('admin-box').style.display = 'block';
                window.renderMenu();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 2000);
    };

    window.addProduct = () => {
        const n = document.getElementById('p-name').value, p = parseInt(document.getElementById('p-price').value), i = document.getElementById('p-img').value;
        if(n && p && i) {
            set(push(productsRef), { id: Date.now(), name: n, price: p, img: i }).then(() => {
                alert("Qo'shildi!");
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
            });
        }
    };

    window.removeProduct = (fKey) => remove(ref(db, 'products/' + fKey));
    window.closeAdmin = () => { window.isAdmin = false; document.getElementById('admin-box').style.display = 'none'; window.renderMenu(); };

    window.updateCart();
</script>
</body>
</html>
